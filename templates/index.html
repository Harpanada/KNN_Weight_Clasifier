<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Weight Classifier</title>
  <link rel="icon" type="image/png" href="./media/icon.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]:focus, select:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .predict-btn:active { transform: scale(0.98); }
    .badge-normal  { background: #dcfce7; color: #166534; }
    .badge-under   { background: #dbeafe; color: #1e40af; }
    .badge-over    { background: #fef3c7; color: #92400e; }
    .badge-obese   { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 mb-3">
        <span class="text-2xl">⚖️</span>
      </div>
      <h1 class="text-xl font-semibold text-white">Body Weight Classifier</h1>
      <p class="text-sm text-gray-400 mt-1">Enter your details to get a classification</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl">

      <!-- Age & Gender -->
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5" for="age">Age</label>
          <input
            type="number" id="age" placeholder="25" min="1" max="120"
            class="w-full h-11 px-3 rounded-xl bg-gray-800 border border-gray-700 text-white text-sm placeholder-gray-600 transition-colors"
          >
          <p class="text-xs text-gray-600 mt-1">years</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5" for="gender">Gender</label>
          <select
            id="gender"
            class="w-full h-11 px-3 rounded-xl bg-gray-800 border border-gray-700 text-white text-sm transition-colors cursor-pointer"
          >
            <option value="Male">♂ Male</option>
            <option value="Female">♀ Female</option>
          </select>
        </div>
      </div>

      <!-- Height & Weight -->
      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5" for="height">Height</label>
          <input
            type="number" id="height" placeholder="170" min="50" max="250"
            class="w-full h-11 px-3 rounded-xl bg-gray-800 border border-gray-700 text-white text-sm placeholder-gray-600 transition-colors"
          >
          <p class="text-xs text-gray-600 mt-1">cm</p>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5" for="weight">Weight</label>
          <input
            type="number" id="weight" placeholder="65" min="10" max="300"
            class="w-full h-11 px-3 rounded-xl bg-gray-800 border border-gray-700 text-white text-sm placeholder-gray-600 transition-colors"
          >
          <p class="text-xs text-gray-600 mt-1">kg</p>
        </div>
      </div>

      <!-- Divider -->
      <div class="border-t border-gray-800 mb-5"></div>

      <!-- Result Box -->
      <div id="result" class="hidden mb-5 p-4 bg-gray-800 border border-gray-700 rounded-xl text-center">
        <p class="text-xs uppercase tracking-widest text-gray-500 mb-1">Classification</p>
        <p id="priceDisplay" class="text-2xl font-semibold text-white">—</p>
        <span id="resultBadge" class="inline-block mt-2 px-3 py-1 rounded-full text-xs font-medium"></span>
      </div>

      <!-- Button -->
      <button
        onclick="predict()"
        id="predictBtn"
        class="predict-btn w-full h-11 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-semibold transition-colors cursor-pointer border-0"
      >
        🔮 Predict Body Weight
      </button>

    </div>

    <p class="text-center text-xs text-gray-700 mt-4">Powered by ML Model</p>
  </div>

</body>

<script>
function getBadgeClass(val) {
  if (!val) return '';
  const v = val.toLowerCase();
  if (v.includes('normal') || v.includes('healthy')) return 'badge-normal';
  if (v.includes('under')) return 'badge-under';
  if (v.includes('obese')) return 'badge-obese';
  if (v.includes('over')) return 'badge-over';
  return 'badge-normal';
}

async function predict() {
  const btn = document.getElementById('predictBtn');
  const resultBox = document.getElementById('result');
  const display = document.getElementById('priceDisplay');
  const badge = document.getElementById('resultBadge');

  const UserInput = {
    Age: document.getElementById("age").value,
    Gender: document.getElementById("gender").value,
    Height: document.getElementById("height").value,
    Weight: document.getElementById('weight').value
  };

  btn.textContent = '⏳ Predicting...';
  btn.disabled = true;

  try {
    const response = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(UserInput)
    });

    const prediction = await response.json();

    if (prediction.status === 'success') {
      display.textContent = prediction.bodyweight;
      badge.textContent = prediction.bodyweight;
      badge.className = getBadgeClass(prediction.bodyweight);
      resultBox.classList.remove('hidden');
    }
  } catch (error) {
    alert('❌ Error: ' + error.message);
  } finally {
    btn.textContent = '🔮 Predict Body Weight';
    btn.disabled = false;
  }
}
</script>
</html>
